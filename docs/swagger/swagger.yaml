basePath: /api/v1
definitions:
  api.AnimeDetailResponse:
    properties:
      anilist_id:
        example: 21
        type: integer
      anime_id:
        type: integer
      cover_image:
        type: string
      custom_search_query:
        type: string
      episodes:
        items:
          $ref: '#/definitions/api.AnimeEpisodeInfo'
        type: array
      progress:
        type: integer
      status:
        type: string
      total_episodes:
        type: integer
    type: object
  api.AnimeEpisodeInfo:
    properties:
      airing_at:
        type: integer
      download_date:
        type: string
      episode_id:
        type: integer
      episode_name:
        type: string
      episode_number:
        type: integer
      is_aired:
        type: boolean
      is_blocked:
        type: boolean
      is_downloaded:
        type: boolean
      is_manually_managed:
        type: boolean
      is_watched:
        type: boolean
      time_until_airing:
        type: integer
    type: object
  api.AnimeInfo:
    properties:
      anime_id:
        example: 12345
        type: integer
      cover_image:
        type: string
      episodes_downloaded:
        example: 8
        type: integer
      episodes_released:
        example: 10
        type: integer
      episodes_watched:
        example: 5
        type: integer
      is_blacklisted:
        type: boolean
      last_download_date:
        example: "2026-02-24T10:30:00Z"
        type: string
      latest_episode_id:
        example: 12
        type: integer
      name:
        example: Naruto
        type: string
      total_episodes:
        example: 12
        type: integer
    type: object
  api.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  api.LogsResponse:
    properties:
      lines:
        items:
          type: string
        type: array
    type: object
  api.StatusResponse:
    properties:
      disk_free:
        example: 128849018880
        type: integer
      disk_total:
        example: 500107862016
        type: integer
      has_error:
        example: false
        type: boolean
      last_check:
        example: "2024-01-01T00:00:00Z"
        type: string
      status:
        example: running
        type: string
      version:
        example: 1.2.0
        type: string
    type: object
  api.SuccessResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/api.ErrorInfo'
      success:
        type: boolean
    type: object
  api.animeSettingsRequest:
    properties:
      custom_search_query:
        type: string
    type: object
  files.Config:
    properties:
      anilist_username:
        type: string
      anilist_usernames:
        items:
          type: string
        type: array
      check_interval:
        type: integer
      completed_anime_path:
        type: string
      delete_statuses:
        items:
          type: string
        type: array
      delete_watched_episodes:
        type: boolean
      download_statuses:
        items:
          type: string
        type: array
      episode_retry_limit:
        type: integer
      excluded_list:
        type: string
      excluded_lists:
        items:
          type: string
        type: array
      max_episodes_per_anime:
        type: integer
      notifications:
        $ref: '#/definitions/files.NotificationsConfig'
      priorities:
        $ref: '#/definitions/nyaa.Priorities'
      qbittorrent_url:
        type: string
      rename_files_for_jellyfin:
        type: boolean
      save_path:
        type: string
      watched_episodes_to_keep:
        type: integer
    type: object
  files.NotificationsConfig:
    properties:
      webhooks:
        items:
          $ref: '#/definitions/files.WebhookPreset'
        type: array
    type: object
  files.WebhookPreset:
    properties:
      body:
        type: string
      events:
        items:
          type: string
        type: array
      headers:
        additionalProperties:
          type: string
        type: object
      method:
        type: string
      name:
        type: string
      url:
        type: string
    type: object
  nyaa.Priorities:
    properties:
      audio:
        items:
          type: string
        type: array
      codecs:
        items:
          type: string
        type: array
      criteria_order:
        description: |-
          CriteriaOrder é a ordem em que os critérios de sort são aplicados.
          Valores válidos: uncensored, source, resolution, codec, fansub, audio, health, size.
        items:
          type: string
        type: array
      fansubs:
        items:
          type: string
        type: array
      ignore_list:
        description: 'IgnoreList: substrings (case-insensitive) que descartam o release
          de vez.'
        items:
          type: string
        type: array
      resolutions:
        items:
          type: string
        type: array
      sources:
        items:
          type: string
        type: array
    type: object
host: localhost:8091
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: REST API for Auto Anime Downloader daemon
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
  termsOfService: http://swagger.io/terms/
  title: Auto Anime Downloader API
  version: "1.0"
paths:
  /animes:
    get:
      consumes:
      - application/json
      description: Returns a list of animes with aggregated episode information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/api.AnimeInfo'
                  type: array
              type: object
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get animes list
      tags:
      - animes
  /animes/{id}/episodes:
    get:
      consumes:
      - application/json
      description: Returns anime info from AniList combined with downloaded episodes
        data
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.AnimeDetailResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get detail and episodes for a specific anime
      tags:
      - animes
  /animes/{id}/episodes/{episodeId}:
    delete:
      consumes:
      - application/json
      description: Deletes a downloaded episode from qBittorrent and blocks it from
        being re-downloaded automatically
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Episode ID (AniList AiringNode ID)
        in: path
        name: episodeId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Manually delete a downloaded episode
      tags:
      - animes
  /animes/{id}/episodes/{episodeId}/download:
    post:
      consumes:
      - application/json
      description: Triggers an immediate download for an aired episode and marks it
        as manually managed
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Episode ID (AniList AiringNode ID)
        in: path
        name: episodeId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Manually download an episode
      tags:
      - animes
  /animes/{id}/episodes/{episodeId}/redownload:
    post:
      consumes:
      - application/json
      description: Deletes the existing torrent (if any) and searches Nyaa again for
        a fresh download
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Episode ID (AniList AiringNode ID)
        in: path
        name: episodeId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Redownload an episode from Nyaa
      tags:
      - animes
  /animes/{id}/episodes/{episodeId}/release:
    post:
      consumes:
      - application/json
      description: Unblocks and unmanages an episode so the daemon can handle it automatically
        again
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Episode ID (AniList AiringNode ID)
        in: path
        name: episodeId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Release an episode from manual management
      tags:
      - animes
  /animes/{id}/episodes/{episodeId}/replace:
    post:
      consumes:
      - application/json
      description: Deletes the existing torrent (if any) and downloads the episode
        using the provided magnet link
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Episode ID (AniList AiringNode ID)
        in: path
        name: episodeId
        required: true
        type: integer
      - description: Magnet link
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Replace a downloaded episode with a user-supplied magnet link
      tags:
      - animes
  /animes/{id}/replace:
    post:
      consumes:
      - application/json
      description: Deletes all existing torrents for the anime and downloads using
        the provided magnet link, marking all aired episodes as downloaded
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Magnet link
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Replace all downloaded episodes of an anime with a user-supplied batch
        magnet link
      tags:
      - animes
  /animes/{id}/settings:
    get:
      consumes:
      - application/json
      description: GET returns current settings; PUT updates them
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Settings
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.animeSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get or update anime-specific settings
      tags:
      - animes
    put:
      consumes:
      - application/json
      description: GET returns current settings; PUT updates them
      parameters:
      - description: Anime ID (AniList MediaList ID)
        in: path
        name: id
        required: true
        type: integer
      - description: Settings
        in: body
        name: body
        schema:
          $ref: '#/definitions/api.animeSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get or update anime-specific settings
      tags:
      - animes
  /check:
    post:
      consumes:
      - application/json
      description: Triggers a manual anime verification check
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Trigger manual check
      tags:
      - daemon
  /config:
    get:
      consumes:
      - application/json
      description: Returns the current daemon configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/files.Config'
              type: object
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get configuration
      tags:
      - config
    put:
      consumes:
      - application/json
      description: Updates the daemon configuration with the provided values
      parameters:
      - description: Configuration object
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/files.Config'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Update configuration
      tags:
      - config
  /config/priorities/defaults:
    get:
      description: Returns the built-in default priority lists (for the "reset to
        default" button)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/nyaa.Priorities'
              type: object
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get default torrent priorities
      tags:
      - config
  /daemon/start:
    post:
      consumes:
      - application/json
      description: Starts the daemon loop for automatic anime checking
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Start daemon
      tags:
      - daemon
  /daemon/stop:
    post:
      consumes:
      - application/json
      description: Stops the daemon loop
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Stop daemon
      tags:
      - daemon
  /logs:
    get:
      consumes:
      - application/json
      description: Returns the last N lines from the daemon log file
      parameters:
      - description: 'Number of lines to return (default: 1000, max: 10000)'
        in: query
        name: lines
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.LogsResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get daemon logs
      tags:
      - logs
  /notifications/webhooks/{name}/test:
    post:
      description: Fires a named webhook with sample variables to verify connectivity
      parameters:
      - description: Webhook preset name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Test a webhook preset
      tags:
      - notifications
  /status:
    get:
      consumes:
      - application/json
      description: Returns the current status of the daemon, including last check
        time, error state, and disk space for the configured save path
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/api.StatusResponse'
              type: object
        "405":
          description: Method Not Allowed
          schema:
            $ref: '#/definitions/api.SuccessResponse'
      summary: Get daemon status
      tags:
      - status
schemes:
- http
swagger: "2.0"
