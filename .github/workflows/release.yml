name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: |
          cd src/internal/frontend
          bun install --frozen-lockfile
          bun run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/internal/frontend/dist/*
          retention-days: 1

  release-linux-amd64:
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/internal/frontend/dist

      - name: Build and package for Linux AMD64
        env:
          VERSION: ${{ needs.build-frontend.outputs.version }}
        run: make release PLATFORM=linuxamd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-package
          path: |
            build/packages/AutoAnimeDownloader_Linux_x86_v${{ needs.build-frontend.outputs.version }}.zip
            build/packages/AutoAnimeDownloader_Linux_x86_v${{ needs.build-frontend.outputs.version }}.zip.sha256
          retention-days: 30

  release-linux-arm64:
    runs-on: ubuntu-24.04-arm
    needs: build-frontend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/internal/frontend/dist

      - name: Build and package for Linux ARM64
        env:
          VERSION: ${{ needs.build-frontend.outputs.version }}
        run: make release PLATFORM=linuxarm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-package
          path: |
            build/packages/AutoAnimeDownloader_Linux_Arm64_v${{ needs.build-frontend.outputs.version }}.zip
            build/packages/AutoAnimeDownloader_Linux_Arm64_v${{ needs.build-frontend.outputs.version }}.zip.sha256
          retention-days: 30

  release-windows-amd64:
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/internal/frontend/dist

      - name: Build and package for Windows AMD64
        env:
          VERSION: ${{ needs.build-frontend.outputs.version }}
        run: make release PLATFORM=windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-package
          path: |
            build/packages/AutoAnimeDownloader_Windows_v${{ needs.build-frontend.outputs.version }}.exe
            build/packages/AutoAnimeDownloader_Windows_v${{ needs.build-frontend.outputs.version }}.exe.sha256
          retention-days: 30

  create-release:
    needs: [release-linux-amd64, release-linux-arm64, release-windows-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: '*-package'
          path: release-artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
